<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiskFlow.js</title>
  <style>
    :root {
      --bg: #d9d9dc;
      --panel: #c8c8cb;
      --btn: #efefef;
      --btn-border: #7a7a7a;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: sans-serif;
      color: #111;
    }

    .app {
      width: 1000px;
      max-width: calc(100vw - 24px);
      margin: 10px auto;
      border: 1px solid #bbb;
      background: var(--bg);
    }

    .toolbar, .footer {
      background: var(--panel);
      padding: 8px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      user-select: none;
    }
	
	.credit {
	  margin: 10px 14px 6px;
	  font-size: 13px;
	  color: #333;
	  text-align: center;
	}
	.credit a {
	  color: #1a4ea1;
	  text-decoration: underline;
	}

    button {
      background: var(--btn);
      border: 1px solid var(--btn-border);
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #fff; }

    .traceLabel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }
    .doublePointBox {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-sizing: border-box;
      background: var(--btn);
      border: 1px solid var(--btn-border);
      padding: 4px 10px;
      font-size: 14px;
      line-height: normal;
    }
    .doublePointTitle {
      font-family: inherit;
      font-size: inherit;
      font-weight: normal;
      color: #111;
    }
    .doublePointNum {
      font-weight: bold;
      font-size: inherit;
      color: #111;
      min-width: 1.25em;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    canvas {
      display: block;
      width: 100%;
      height: 540px;
      background: var(--bg);
      cursor: crosshair;
      touch-action: none; /* critical for mobile drawing */
    }

    .radios {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
    }
    .radios label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* Mobile-friendly controls */
    @media (max-width: 720px) {
      .toolbar, .footer {
        gap: 8px;
        padding: 10px;
        flex-wrap: wrap;
      }
      button {
        font-size: 16px;
        padding: 8px 12px;
      }
      .traceLabel, .radios label {
        font-size: 16px;
      }
      .doublePointBox {
        font-size: 16px;
        padding: 8px 12px;
      }
      canvas {
        height: 62vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button id="clearBtn">clear</button>
      <button id="resetBtn">reset</button>
      <button id="runBtn">start disk flow</button>
      <label class="traceLabel">
        <input type="checkbox" id="traceToggle" checked />
        leave a trace
      </label>
      <span class="doublePointBox">
        <span class="doublePointTitle">Double point count:</span>
        <span class="doublePointNum" id="intersectionCounter">0</span>
      </span>
      <span id="debugGridOptionWrap">
        <label class="traceLabel">
          <input type="checkbox" id="debugOverlayToggle" />
          debug grid
        </label>
      </span>
    </div>

    <canvas id="canvas"></canvas>
	
	<p class="credit">
	  This is a JavaScript port of a Java applet by Richard Vaughn and Joel Hass which demonstrates the curve shortening flow of Hass - Scott.
	  <a href="https://www.math.ucdavis.edu/~hass/Research/DiskFlow/flow.html" target="_blank" rel="noopener noreferrer">
		Original page</a>.
	</p>

    <div class="footer">
      <div class="radios">
        <label><input type="radio" name="res" value="fine" checked />fine</label>
        <label><input type="radio" name="res" value="medium" />medium</label>
        <label><input type="radio" name="res" value="coarse" />coarse</label>
        <label><input type="radio" name="res" value="super" />super coarse</label>
      </div>
    </div>
  </div>

  <script>
    /** Set to true to show the "debug grid" checkbox in the toolbar. */
    const SHOW_DEBUG_GRID_OPTION = false;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const clearBtn = document.getElementById("clearBtn");
    const resetBtn = document.getElementById("resetBtn");
    const runBtn = document.getElementById("runBtn");
    const traceToggle = document.getElementById("traceToggle");
    const intersectionCounter = document.getElementById("intersectionCounter");

    const debugGridOptionWrap = document.getElementById("debugGridOptionWrap");
    if (!SHOW_DEBUG_GRID_OPTION && debugGridOptionWrap) debugGridOptionWrap.remove();
    const debugOverlayToggle = document.getElementById("debugOverlayToggle");
    const resRadios = [...document.querySelectorAll('input[name="res"]')];

    const EPS = 1e-9;
    const STEP_MS = 30;
    const SAMPLE_MIN_DIST_MOUSE = 2.2;
    const SAMPLE_MIN_DIST_TOUCH = 3.5;

    const cellSizeMap = { fine: 8, medium: 16, coarse: 32, super: 64 };

    let gridMode = "fine";
    let s = cellSizeMap[gridMode];
    let ox = 0;
    let oy = 0;

    let drawing = false;
    let running = false;
    let activePointerId = null;
    let activePointerType = "mouse";

    // Curves stored as closed loops without duplicating first point at end.
    let curves = [];
    let initialCurves = [];
    let drawingCurve = [];
    let traceStepCount = 0;
    let traceCanvas = document.createElement("canvas");
    let traceCtx = traceCanvas.getContext("2d");

    // ---------- HiDPI / responsive canvas ----------
    function resizeCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssWidth = canvas.clientWidth;
      const cssHeight = canvas.clientHeight;

      const targetW = Math.round(cssWidth * dpr);
      const targetH = Math.round(cssHeight * dpr);

      if (canvas.width !== targetW || canvas.height !== targetH) {
        canvas.width = targetW;
        canvas.height = targetH;
      }

      // Reset transform then map drawing units to CSS pixels
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initTraceCanvas(true);
      render();
    }

    function clearCanvas() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#d9d9dc";
      ctx.fillRect(0, 0, w, h);
    }

    function initTraceCanvas(preserveExisting = false) {
      const prevTrace = traceCanvas;
      const prevWidth = prevTrace.width;
      const prevHeight = prevTrace.height;

      traceCanvas = document.createElement("canvas");
      traceCanvas.width = canvas.width;
      traceCanvas.height = canvas.height;
      traceCtx = traceCanvas.getContext("2d");

      const dpr = Math.max(1, window.devicePixelRatio || 1);
      traceCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      traceCtx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (preserveExisting && traceStepCount > 0 && prevWidth > 0 && prevHeight > 0) {
        traceCtx.drawImage(prevTrace, 0, 0, prevWidth, prevHeight, 0, 0, canvas.clientWidth, canvas.clientHeight);
      }
    }

    function clearTraceCanvas() {
      traceStepCount = 0;
      initTraceCanvas(false);
    }

    function dist2(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return dx * dx + dy * dy;
    }

    function lerp(a, b, t) {
      return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
    }

    function hueColor(i) {
      return `hsl(${(i * 7) % 360} 100% 50%)`;
    }

    function getPointerPos(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: e.clientX - r.left,
        y: e.clientY - r.top
      };
    }

    function cloneCurve(curve) {
      return curve.map(p => ({ x: p.x, y: p.y }));
    }

    function cloneCurves(curveSet) {
      return curveSet.map(cloneCurve);
    }

    function drawCurveOn(targetCtx, curve, color = "#222", width = 2) {
      if (!curve || curve.length < 2) return;
      targetCtx.beginPath();
      targetCtx.moveTo(curve[0].x, curve[0].y);
      for (let i = 1; i < curve.length; i++) targetCtx.lineTo(curve[i].x, curve[i].y);
      targetCtx.closePath();
      targetCtx.strokeStyle = color;
      targetCtx.lineWidth = width;
      targetCtx.stroke();
    }

    function drawCurve(curve, color = "#222", width = 2) {
      drawCurveOn(ctx, curve, color, width);
    }

    function drawCurves(curveSet, color = "#222", width = 2) {
      for (const curve of curveSet) drawCurve(curve, color, width);
    }

    function dedupConsecutive(points, eps = 1e-6) {
      if (points.length === 0) return points;
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        if (Math.hypot(points[i].x - out[out.length - 1].x, points[i].y - out[out.length - 1].y) > eps) {
          out.push(points[i]);
        }
      }
      if (out.length > 1) {
        const a = out[0], b = out[out.length - 1];
        if (Math.hypot(a.x - b.x, a.y - b.y) < eps) out.pop();
      }
      return out;
    }

    function simplifyByDistance(points, minDist = 1.5) {
      if (points.length < 3) return points.slice();
      const md2 = minDist * minDist;
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        if (dist2(points[i], out[out.length - 1]) >= md2) out.push(points[i]);
      }
      return dedupConsecutive(out);
    }

    function resampleClosed(points, step = 3) {
      if (points.length < 2) return points.slice();
      const n = points.length;
      const out = [points[0]];
      let carry = 0;

      for (let i = 0; i < n; i++) {
        const a = points[i];
        const b = points[(i + 1) % n];
        const len = Math.hypot(b.x - a.x, b.y - a.y);
        if (len < EPS) continue;

        let t0 = 0;
        while (carry + len * (1 - t0) >= step) {
          const need = (step - carry) / len;
          const t = t0 + need;
          out.push(lerp(a, b, t));
          t0 = t;
          carry = 0;
        }
        carry += len * (1 - t0);
      }

      return dedupConsecutive(out);
    }

    function cellIdAt(x, y, size, ox, oy) {
      const cx = Math.floor((x - ox) / size);
      const cy = Math.floor((y - oy) / size);
      return `${cx},${cy}`;
    }

    function cellCoordsFromId(cellId) {
      const [cxStr, cyStr] = cellId.split(",");
      return { cx: Number(cxStr), cy: Number(cyStr) };
    }

    /**
     * Cyclic boundary parameter in [0, 4), CCW from bottom-left (BL).
     * Canvas: cell (x0,y0) is top-left; v grows downward (bottom has v≈1).
     */
    function boundaryParamForCell(point, cell, size, ox, oy) {
      const x0 = ox + cell.cx * size;
      const y0 = oy + cell.cy * size;
      const u = (point.x - x0) / size;
      const v = (point.y - y0) / size;
      const tol = 1e-7;

      const onL = u <= tol;
      const onR = u >= 1 - tol;
      const onTop = v <= tol;
      const onBottom = v >= 1 - tol;

      if (!onL && !onR && !onTop && !onBottom) return null;

      if (onBottom && onL) return 0;
      if (onBottom && onR) return 1;
      if (onTop && onR) return 2;
      if (onTop && onL) return 3;

      if (onBottom && !onL && !onR) return u;
      if (onR && !onTop && !onBottom) return 1 + v;
      if (onTop && !onL && !onR) return 2 + (1 - u);
      if (onL && !onTop && !onBottom) return 3 + (1 - v);

      return null;
    }

    /** Proper intersection (interiors cross); excludes parallel/collinear overlap. */
    function segmentsIntersectProper(a, b, c, d) {
      const o = (p, q, r) =>
        (q.x - p.x) * (r.y - p.y) - (q.y - p.y) * (r.x - p.x);
      const tol = 1e-10;
      const o1 = o(a, b, c);
      const o2 = o(a, b, d);
      const o3 = o(c, d, a);
      const o4 = o(c, d, b);
      if (Math.abs(o1) < tol && Math.abs(o2) < tol) return false;
      if (Math.abs(o3) < tol && Math.abs(o4) < tol) return false;
      const s1 = o1 > tol ? 1 : o1 < -tol ? -1 : 0;
      const s2 = o2 > tol ? 1 : o2 < -tol ? -1 : 0;
      const s3 = o3 > tol ? 1 : o3 < -tol ? -1 : 0;
      const s4 = o4 > tol ? 1 : o4 < -tol ? -1 : 0;
      if (s1 === 0 || s2 === 0 || s3 === 0 || s4 === 0) return false;
      return s1 * s2 < 0 && s3 * s4 < 0;
    }

    function analyzeCellStrands(strands, size, ox, oy) {
      if (strands.length < 2) {
        return { count: 0, crossings: [], sortedEndpoints: [], intervals: [] };
      }
      const cell = cellCoordsFromId(strands[0].cellId);

      let count = 0;
      const crossings = [];
      for (let i = 0; i < strands.length; i++) {
        for (let j = i + 1; j < strands.length; j++) {
          const p = strands[i];
          const q = strands[j];
          if (segmentsIntersectProper(p.start, p.end, q.start, q.end)) {
            count++;
            crossings.push([i, j]);
          }
        }
      }

      const endpoints = [];
      for (let pairId = 0; pairId < strands.length; pairId++) {
        const strand = strands[pairId];
        const tStart = boundaryParamForCell(strand.start, cell, size, ox, oy);
        const tEnd = boundaryParamForCell(strand.end, cell, size, ox, oy);
        if (tStart === null || tEnd === null) continue;
        endpoints.push({ pairId, t: tStart, tie: tEnd, pt: strand.start });
        endpoints.push({ pairId, t: tEnd, tie: tStart, pt: strand.end });
      }
      endpoints.sort((a, b) => {
        if (a.t !== b.t) return a.t - b.t;
        if (a.tie !== b.tie) return a.tie - b.tie;
        return a.pairId - b.pairId;
      });

      const intervals = [];
      const pairPositions = new Map();
      for (let ord = 0; ord < endpoints.length; ord++) {
        const e = endpoints[ord];
        if (!pairPositions.has(e.pairId)) pairPositions.set(e.pairId, []);
        pairPositions.get(e.pairId).push(ord);
      }
      for (const [pairId, positions] of pairPositions) {
        if (positions.length !== 2) continue;
        const lo = Math.min(positions[0], positions[1]);
        const hi = Math.max(positions[0], positions[1]);
        intervals.push({ lo, hi, pairId });
      }

      return { count, crossings, sortedEndpoints: endpoints, intervals };
    }

    function countCellIntersections(strands, size, ox, oy) {
      return analyzeCellStrands(strands, size, ox, oy).count;
    }

    function buildStrandsByCell(curveSet, size, ox, oy) {
      const byCell = new Map();
      if (!curveSet.length) return byCell;
      for (const curve of curveSet) {
        if (!curve || curve.length < 3) continue;
        for (let i = 0; i < curve.length; i++) {
          const A = curve[i];
          const B = curve[(i + 1) % curve.length];
          const ts = segmentIntersectionsWithGrid(A, B, size, ox, oy);
          for (let j = 0; j < ts.length - 1; j++) {
            const t0 = ts[j], t1 = ts[j + 1];
            if (t1 - t0 < 1e-10) continue;
            const start = lerp(A, B, t0);
            const end = lerp(A, B, t1);
            const pm = lerp(A, B, (t0 + t1) * 0.5);
            const cellId = cellIdAt(pm.x, pm.y, size, ox, oy);
            if (!byCell.has(cellId)) byCell.set(cellId, []);
            byCell.get(cellId).push({ cellId, start, end });
          }
        }
      }
      return byCell;
    }

    let lastIntersectionDebug = { total: 0, byCell: new Map(), cellAnalysis: new Map() };

    function pairHue(pairId) {
      return `hsl(${(pairId * 37) % 360} 72% 42%)`;
    }

    function updateIntersectionCounter() {
      const byCell = buildStrandsByCell(curves, s, ox, oy);
      let total = 0;
      const cellAnalysis = new Map();
      for (const [cellId, strands] of byCell) {
        const a = analyzeCellStrands(strands, s, ox, oy);
        total += a.count;
        cellAnalysis.set(cellId, a);
      }
      lastIntersectionDebug = { total, byCell, cellAnalysis };
      intersectionCounter.textContent = String(total);
    }

    function drawDebugOverlay() {
      if (!debugOverlayToggle || !debugOverlayToggle.checked) return;
      const data = lastIntersectionDebug;
      if (!data || !data.byCell) return;

      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      ctx.save();
      ctx.setLineDash([]);

      ctx.strokeStyle = "rgba(90, 90, 110, 0.18)";
      ctx.lineWidth = 1;
      const xStart = ((ox % s) + s) % s;
      const yStart = ((oy % s) + s) % s;
      for (let x = xStart; x <= w; x += s) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = yStart; y <= h; y += s) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.font = "10px sans-serif";
      ctx.textBaseline = "middle";

      for (const [cellId, strands] of data.byCell) {
        const analysis = data.cellAnalysis.get(cellId);
        const cell = cellCoordsFromId(cellId);
        const x0 = ox + cell.cx * s;
        const y0 = oy + cell.cy * s;

        if (analysis && analysis.count > 0) {
          ctx.strokeStyle = "rgba(200, 0, 160, 0.75)";
          ctx.lineWidth = 2;
        } else if (strands.length >= 2) {
          ctx.strokeStyle = "rgba(0, 100, 200, 0.45)";
          ctx.lineWidth = 1;
        } else {
          ctx.strokeStyle = "rgba(120, 120, 140, 0.25)";
          ctx.lineWidth = 1;
        }
        ctx.strokeRect(x0 + 0.5, y0 + 0.5, s - 1, s - 1);

        for (let idx = 0; idx < strands.length; idx++) {
          const strand = strands[idx];
          ctx.strokeStyle = pairHue(idx);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(strand.start.x, strand.start.y);
          ctx.lineTo(strand.end.x, strand.end.y);
          ctx.stroke();
        }

        if (analysis && analysis.sortedEndpoints.length) {
          analysis.sortedEndpoints.forEach((ep, ord) => {
            ctx.fillStyle = pairHue(ep.pairId);
            ctx.beginPath();
            ctx.arc(ep.pt.x, ep.pt.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 9px sans-serif";
            ctx.fillText(String(ord), ep.pt.x - 3, ep.pt.y);
          });
        }

        if (analysis && analysis.crossings.length) {
          const cxMid = x0 + s * 0.5;
          const cyMid = y0 + s * 0.5;
          ctx.fillStyle = "rgba(180, 0, 140, 0.95)";
          ctx.font = "9px sans-serif";
          const txt = analysis.crossings.map(([a, b]) => `${a}×${b}`).join(" ");
          ctx.fillText(txt, x0 + 4, y0 + 12);
        }

        ctx.fillStyle = "rgba(40, 40, 50, 0.85)";
        ctx.font = "8px monospace";
        ctx.fillText(cellId, x0 + 4, y0 + s - 6);
      }

      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.font = "11px sans-serif";
      ctx.fillText(
        `grid s=${s} ox=${ox.toFixed(2)} oy=${oy.toFixed(2)}  strand-cells=${data.byCell.size}  total=${data.total}`,
        8,
        14
      );

      ctx.restore();
    }

    function segmentIntersectionsWithGrid(A, B, size, ox, oy) {
      const dx = B.x - A.x;
      const dy = B.y - A.y;
      const ts = [0, 1];

      if (Math.abs(dx) > EPS) {
        const minX = Math.min(A.x, B.x);
        const maxX = Math.max(A.x, B.x);
        const k0 = Math.ceil((minX - ox) / size);
        const k1 = Math.floor((maxX - ox) / size);
        for (let k = k0; k <= k1; k++) {
          const xg = ox + k * size;
          const t = (xg - A.x) / dx;
          if (t > EPS && t < 1 - EPS) ts.push(t);
        }
      }

      if (Math.abs(dy) > EPS) {
        const minY = Math.min(A.y, B.y);
        const maxY = Math.max(A.y, B.y);
        const k0 = Math.ceil((minY - oy) / size);
        const k1 = Math.floor((maxY - oy) / size);
        for (let k = k0; k <= k1; k++) {
          const yg = oy + k * size;
          const t = (yg - A.y) / dy;
          if (t > EPS && t < 1 - EPS) ts.push(t);
        }
      }

      ts.sort((a, b) => a - b);

      const out = [];
      for (const t of ts) {
        if (!out.length || Math.abs(t - out[out.length - 1]) > 1e-7) out.push(t);
      }
      return out;
    }

    // Exact-ish reconstruction by cell-run replacement:
    // split segments at grid crossings, classify each atomic piece by cell midpoint,
    // merge contiguous atomic pieces in same cell, replace each merged run by chord.
    function iterateDiskFlowExact(curve, size, ox, oy) {
      if (!curve || curve.length < 3) return curve.slice();
      const n = curve.length;
      const pieces = [];

      for (let i = 0; i < n; i++) {
        const A = curve[i];
        const B = curve[(i + 1) % n];
        const ts = segmentIntersectionsWithGrid(A, B, size, ox, oy);

        for (let j = 0; j < ts.length - 1; j++) {
          const t0 = ts[j], t1 = ts[j + 1];
          if (t1 - t0 < 1e-10) continue;

          const p0 = lerp(A, B, t0);
          const p1 = lerp(A, B, t1);
          const pm = lerp(A, B, (t0 + t1) * 0.5);
          const cellId = cellIdAt(pm.x, pm.y, size, ox, oy);

          pieces.push({ cellId, start: p0, end: p1 });
        }
      }

      if (!pieces.length) return curve.slice();

      const runs = [];
      let run = { cellId: pieces[0].cellId, start: pieces[0].start, end: pieces[0].end };

      for (let i = 1; i < pieces.length; i++) {
        const p = pieces[i];
        if (p.cellId === run.cellId) {
          run.end = p.end;
        } else {
          runs.push(run);
          run = { cellId: p.cellId, start: p.start, end: p.end };
        }
      }
      runs.push(run);

      // close-the-loop merge
      if (runs.length > 1 && runs[0].cellId === runs[runs.length - 1].cellId) {
        runs[0] = { cellId: runs[0].cellId, start: runs[runs.length - 1].start, end: runs[0].end };
        runs.pop();
      }

      const out = [];
      out.push(runs[0].start);
      for (const r of runs) out.push(r.end);

      let cleaned = dedupConsecutive(out, 1e-6);
      cleaned = simplifyByDistance(cleaned, 0.8);
      cleaned = resampleClosed(cleaned, 2.4);

      return cleaned;
    }

    function render() {
      updateIntersectionCounter();
      clearCanvas();

      if (traceToggle.checked) {
        if (traceStepCount > 0) {
          ctx.drawImage(traceCanvas, 0, 0, canvas.clientWidth, canvas.clientHeight);
        }
        drawCurves(curves, hueColor(traceStepCount), 2.0);
      } else {
        drawCurves(curves, "#222", 2.0);
      }

      if (drawing) drawCurve(drawingCurve, "#222", 2.0);

      drawDebugOverlay();
    }

    function stepFlow() {
      if (!running || curves.length === 0) return;

      if (traceToggle.checked) {
        const color = hueColor(traceStepCount);
        for (const curve of curves) drawCurveOn(traceCtx, curve, color, 2.0);
        traceStepCount++;
      }

      curves = curves
        .map(curve => iterateDiskFlowExact(curve, s, ox, oy))
        .filter(curve => curve.length >= 3);
      if (curves.length === 0) {
        running = false;
        runBtn.textContent = "start disk flow";
      }

      ox = (ox + s / 3) % s;
      oy = (oy + s / 3) % s;

      render();
    }

    function finishDrawingAndAutoClose() {
      drawing = false;
      if (drawingCurve.length > 2) {
        let closed = simplifyByDistance(drawingCurve, 1.4);
        closed = dedupConsecutive(closed);
        closed = resampleClosed(closed, 3.0); // auto-close behavior
        if (closed.length > 2) {
          curves.push(closed);
          initialCurves = cloneCurves(curves);
        }
      }
      drawingCurve = [];
      render();
    }

    // ---------- Pointer events (mouse + touch + pen) ----------
    canvas.addEventListener("pointerdown", (e) => {
      // ignore secondary pointers; single-stroke model
      if (activePointerId !== null) return;

      activePointerId = e.pointerId;
      activePointerType = e.pointerType || "mouse";
      canvas.setPointerCapture(activePointerId);

      e.preventDefault();

      running = false;
      runBtn.textContent = "start disk flow";
      clearTraceCanvas();

      drawing = true;
      const p = getPointerPos(e);
      drawingCurve = [p];
      render();
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!drawing) return;
      if (e.pointerId !== activePointerId) return;

      e.preventDefault();

      const p = getPointerPos(e);
      const last = drawingCurve[drawingCurve.length - 1];
      const minDist = (activePointerType === "touch") ? SAMPLE_MIN_DIST_TOUCH : SAMPLE_MIN_DIST_MOUSE;

      if (!last || dist2(last, p) > minDist * minDist) {
        drawingCurve.push(p);
        render();
      }
    });

    function endPointer(e) {
      if (activePointerId === null) return;
      if (e.pointerId !== activePointerId) return;

      e.preventDefault();

      try { canvas.releasePointerCapture(activePointerId); } catch (_) {}
      activePointerId = null;
      activePointerType = "mouse";

      finishDrawingAndAutoClose();
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("lostpointercapture", (e) => {
      if (e.pointerId === activePointerId) {
        activePointerId = null;
        activePointerType = "mouse";
        if (drawing) finishDrawingAndAutoClose();
      }
    });

    clearBtn.addEventListener("click", () => {
      running = false;
      runBtn.textContent = "start disk flow";
      drawing = false;
      activePointerId = null;
      curves = [];
      initialCurves = [];
      drawingCurve = [];
      clearTraceCanvas();
      ox = 0;
      oy = 0;
      render();
    });

    resetBtn.addEventListener("click", () => {
      if (initialCurves.length === 0) return;
      running = false;
      drawing = false;
      activePointerId = null;
      activePointerType = "mouse";
      runBtn.textContent = "start disk flow";
      curves = cloneCurves(initialCurves);
      drawingCurve = [];
      clearTraceCanvas();
      ox = 0;
      oy = 0;
      render();
    });

    runBtn.addEventListener("click", () => {
      if (curves.length === 0) return;
      running = !running;
      runBtn.textContent = running ? "stop disk flow" : "start disk flow";
    });

    traceToggle.addEventListener("change", () => {
      if (!traceToggle.checked) {
        clearTraceCanvas();
      }
      render();
    });

    if (debugOverlayToggle) {
      debugOverlayToggle.addEventListener("change", () => {
        render();
      });
    }

    for (const r of resRadios) {
      r.addEventListener("change", () => {
        if (!r.checked) return;
        gridMode = r.value;
        s = cellSizeMap[gridMode];
        render();
      });
    }

    window.addEventListener("resize", resizeCanvas);

    let last = performance.now();
    function animate(now) {
      if (running && now - last >= STEP_MS) {
        stepFlow();
        last = now;
      }
      requestAnimationFrame(animate);
    }

    resizeCanvas();
    initTraceCanvas(false);
    updateIntersectionCounter();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
